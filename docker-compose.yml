# ECG Batch Platform – local stack (Step 1)
# Postgres (metadata) + MinIO (object storage) + bucket bootstrap.
# Run from project root: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ecg_metadata}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecg} -d ${POSTGRES_DB:-ecg_metadata}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: ${MINIO_BUCKET:-ecg-datalake}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb myminio/$$MINIO_BUCKET --ignore-existing;
      echo Bucket $$MINIO_BUCKET ready;
      "
    restart: "no"

  ingestion:
    build: ./services/ingestion
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/mitdb:/data/mitdb
    environment:
      RUN_ID: ${RUN_ID:-}
      RUN_DATE: ${RUN_DATE:-}
      RECORD_IDS: ${RECORD_IDS:-}
      RECORD_RANGE: ${RECORD_RANGE:-}
      RECORD_LIMIT: ${RECORD_LIMIT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecg_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-ecg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-ecg-datalake}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      INGEST_OVERWRITE: ${INGEST_OVERWRITE:-false}
      WFDB_LOCAL_DIR: ${WFDB_LOCAL_DIR:-/data/mitdb}
      USE_SYNTHETIC_DATA: ${USE_SYNTHETIC_DATA:-true}
      DEV_SLICE_SECONDS: ${DEV_SLICE_SECONDS:-}
    profiles:
      - ingestion

  processing:
    build: ./services/processing
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      RUN_ID: ${RUN_ID:-}
      RUN_DATE: ${RUN_DATE:-}
      RECORD_IDS: ${RECORD_IDS:-}
      RECORD_RANGE: ${RECORD_RANGE:-}
      RECORD_LIMIT: ${RECORD_LIMIT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecg_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-ecg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-ecg-datalake}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      PROCESS_OVERWRITE: ${PROCESS_OVERWRITE:-false}
    profiles:
      - processing

  aggregation:
    build: ./services/aggregation
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      RUN_ID: ${RUN_ID:-}
      RUN_DATE: ${RUN_DATE:-}
      RECORD_IDS: ${RECORD_IDS:-}
      RECORD_RANGE: ${RECORD_RANGE:-}
      RECORD_LIMIT: ${RECORD_LIMIT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ecg_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-ecg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-ecg-datalake}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      AGG_OVERWRITE: ${AGG_OVERWRITE:-false}
    profiles:
      - aggregation

volumes:
  postgres_data:
  minio_data:
